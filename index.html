<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>边缘骰子 · Edge Dice</title>
<meta name="theme-color" content="#07070e">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
:root{--bg:#07070e;--bg2:#0c0c18;--card:#10101e;--card2:#14142a;--accent:#d4941a;--accent-glow:rgba(212,148,26,0.35);--accent2:#f0b840;--fg:#e8e4d9;--muted:#6e6b62;--danger:#e74c3c;--danger-glow:rgba(231,76,60,0.3);--success:#2ecc71;--success-glow:rgba(46,204,113,0.3);--border:#252538;--radius:14px;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden;}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.6;}
.page{display:none;position:relative;z-index:1;min-height:100vh;animation:fadeUp .5s ease;}
.page.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;position:sticky;top:0;z-index:10;background:rgba(7,7,14,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
.top-bar-left,.top-bar-right{display:flex;align-items:center;gap:12px;}
.back-btn{background:none;border:1px solid var(--border);color:var(--fg);padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px;transition:all .2s;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.page-title{font-family:'Cinzel',serif;font-size:1.4rem;font-weight:900;letter-spacing:4px;color:var(--accent);}
.main-container{max-width:800px;margin:0 auto;padding:20px 20px 100px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:border .2s;}
.card:hover{border-color:rgba(212,148,26,0.2);}

/* Home */
.home-content{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;text-align:center;position:relative;z-index:1;}
.home-title{font-family:'Cinzel',serif;font-size:clamp(2.5rem,8vw,4.5rem);font-weight:900;color:var(--accent);letter-spacing:8px;text-shadow:0 0 40px var(--accent-glow);}
.home-subtitle{font-size:1rem;color:var(--muted);margin-top:12px;letter-spacing:4px;}
.home-input-wrap{margin-top:40px;width:100%;max-width:320px;}
.home-input{width:100%;padding:14px 20px;border-radius:12px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-size:16px;text-align:center;outline:none;transition:border .2s;}
.home-input:focus{border-color:var(--accent);}
.home-input::placeholder{color:var(--muted);}
.home-btn{margin-top:16px;width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#07070e;font-weight:700;font-size:16px;cursor:pointer;transition:transform .15s,box-shadow .2s;letter-spacing:2px;}
.home-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px var(--accent-glow);}
.home-btn:active{transform:translateY(0);}
.home-admin-link{margin-top:20px;color:var(--muted);font-size:13px;cursor:pointer;transition:color .2s;}
.home-admin-link:hover{color:var(--accent);}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;}
.stat-label{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;text-transform:uppercase;}
.stat-value{font-size:24px;font-weight:800;font-family:'Cinzel',serif;color:var(--fg);}
.stat-value.accent{color:var(--accent);}
.stat-value.danger{color:var(--danger);}
.stat-value.success{color:var(--success);}
.player-badge{display:inline-flex;align-items:center;gap:6px;background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:13px;margin-bottom:16px;}
.player-badge i{color:var(--accent);}

/* Dice */
.dice-area{display:flex;flex-direction:column;align-items:center;padding:20px 0;}
.dice-scene{width:150px;height:150px;perspective:600px;margin-bottom:20px;}
.dice-cube{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.3s ease;transform:rotateX(-15deg) rotateY(15deg);}
.dice-cube.idle{animation:diceIdle 4s ease-in-out infinite;}
.dice-cube.spinning{animation:dice-spin 1.3s cubic-bezier(.1,.8,.2,1);}
@keyframes diceIdle{0%,100%{transform:rotateX(-15deg) rotateY(15deg)}50%{transform:rotateX(-10deg) rotateY(-15deg)}}
@keyframes dice-spin{0%{transform:rotateX(0) rotateY(0) rotateZ(0)}15%{transform:rotateX(120deg) rotateY(60deg) rotateZ(30deg)}30%{transform:rotateX(240deg) rotateY(180deg) rotateZ(-20deg)}50%{transform:rotateX(400deg) rotateY(300deg) rotateZ(60deg)}70%{transform:rotateX(600deg) rotateY(420deg) rotateZ(-40deg)}85%{transform:rotateX(780deg) rotateY(540deg) rotateZ(20deg)}100%{transform:rotateX(900deg) rotateY(630deg) rotateZ(0)}}
.dice-face{position:absolute;width:130px;height:130px;border-radius:16px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:18px;gap:4px;background:linear-gradient(145deg,#1a1a30,#12122a);border:2px solid rgba(212,148,26,0.4);box-shadow:inset 0 0 30px rgba(0,0,0,0.4);top:10px;left:10px;}
.dice-face .dot-cell{display:flex;align-items:center;justify-content:center;}
.dice-face .dot{width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--accent2),var(--accent));box-shadow:0 0 10px var(--accent-glow),0 2px 4px rgba(0,0,0,0.5);}
.face-1{transform:translateZ(65px);}.face-6{transform:rotateY(180deg) translateZ(65px);}.face-2{transform:rotateY(90deg) translateZ(65px);}.face-5{transform:rotateY(-90deg) translateZ(65px);}.face-3{transform:rotateX(90deg) translateZ(65px);}.face-4{transform:rotateX(-90deg) translateZ(65px);}
.dice-glow{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,var(--accent-glow),transparent 70%);pointer-events:none;opacity:0;transition:opacity .3s;top:50%;left:50%;transform:translate(-50%,-50%);z-index:-1;}
.dice-glow.show{opacity:1;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:inherit;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-accent{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#07070e;}
.btn-accent:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 4px 16px var(--accent-glow);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--fg);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.3);color:var(--danger);}
.btn-danger:hover{background:rgba(231,76,60,0.25);}
.btn-success{background:rgba(46,204,113,0.15);border:1px solid rgba(46,204,113,0.3);color:var(--success);}
.btn-success:hover{background:rgba(46,204,113,0.25);}
.btn-sm{padding:8px 12px;font-size:12px;border-radius:8px;}
.btn-full{width:100%;}
.btn-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.roll-btn{width:200px;padding:16px;font-size:18px;font-weight:900;letter-spacing:4px;border-radius:14px;font-family:'Cinzel',serif;}

/* Exchange */
.exchange-section{margin-top:16px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);}
.exchange-title{font-size:13px;color:var(--muted);letter-spacing:1px;margin-bottom:10px;}
.exchange-row{display:flex;align-items:center;gap:10px;}
.exchange-input{width:80px;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--fg);font-size:14px;text-align:center;outline:none;}
.exchange-input:focus{border-color:var(--accent);}

/* Progress */
.progress-section{margin-top:16px;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);}
.progress-bar-wrap{height:8px;background:#252538;border-radius:10px;overflow:hidden;margin-top:8px;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:10px;transition:width 0.4s ease;}

/* Ban */
.ban-banner{background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);border-radius:10px;padding:12px 16px;text-align:center;color:var(--danger);font-size:13px;margin-bottom:12px;animation:banPulse 2s infinite;}
@keyframes banPulse{0%,100%{opacity:1}50%{opacity:0.7}}

/* History */
.history-list{max-height:300px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.history-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(37,37,56,0.5);}
.history-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;}
.history-dot.good{background:rgba(46,204,113,0.15);color:var(--success);border:1px solid rgba(46,204,113,0.3);}
.history-dot.bad{background:rgba(231,76,60,0.15);color:var(--danger);border:1px solid rgba(231,76,60,0.3);}
.history-text{flex:1;font-size:13px;color:var(--fg);}
.history-time{font-size:11px;color:var(--muted);white-space:nowrap;}

/* Admin */
.admin-section{margin-bottom:28px;}
.admin-section-title{font-size:14px;color:var(--accent);letter-spacing:2px;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.admin-status-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;}

/* Player List */
.player-list{display:flex;flex-direction:column;gap:12px;}
.player-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:all .2s;}
.player-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.player-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.player-name{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px;}
.player-name i{color:var(--accent);font-size:12px;}
.player-stats-mini{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:12px;}
.player-stat{text-align:center;}
.player-stat-label{color:var(--muted);font-size:10px;letter-spacing:0.5px;}
.player-stat-val{font-weight:700;font-family:'Cinzel',serif;font-size:14px;margin-top:2px;}

/* Overlay */
.overlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);padding:20px;}
.overlay.show{display:flex;}
.overlay-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px;max-width:400px;width:100%;text-align:center;animation:fadeIn .3s ease;}
.overlay-icon{font-size:36px;margin-bottom:16px;}
.overlay-icon.danger{color:var(--danger);}.overlay-icon.success{color:var(--success);}.overlay-icon.accent{color:var(--accent);}
.overlay-msg{font-size:18px;font-weight:700;margin-bottom:8px;}
.overlay-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6;}
.overlay-btns{display:flex;gap:12px;justify-content:center;}
.danger-border{border-color:rgba(231,76,60,0.4);}

/* Result Overlay */
.result-overlay{position:fixed;inset:0;z-index:90;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);}
.result-overlay.show{display:flex;}
.result-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px 28px;max-width:360px;width:100%;text-align:center;animation:fadeIn .3s ease;}
.result-num{font-family:'Cinzel',serif;font-size:72px;font-weight:900;margin:16px 0;}
.result-desc{font-size:16px;font-weight:600;margin-bottom:4px;}
.result-detail{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.6;}

/* Login Card */
.login-icon{font-size:36px;color:var(--accent);margin-bottom:16px;}
.login-title{font-family:'Cinzel',serif;font-size:24px;font-weight:900;letter-spacing:4px;margin-bottom:8px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.login-input-wrap{text-align:left;margin-bottom:16px;}
.login-input-wrap label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:0.5px;}
.login-input-wrap input{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-size:14px;outline:none;}
.login-input-wrap input:focus{border-color:var(--accent);}
.login-error{color:var(--danger);font-size:12px;margin-top:8px;min-height:16px;}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;}

/* Setup Input */
.setup-input-group{margin-bottom:14px;text-align:left;}
.setup-input-group label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;}
.setup-input-group input,.setup-input-group select{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-size:14px;outline:none;}
.setup-input-group input:focus{border-color:var(--accent);}

/* Toast */
#toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;}
.toast{padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;animation:slideIn .3s ease,fadeOut .3s ease 2.7s;pointer-events:none;max-width:300px;}
.toast.success{background:rgba(46,204,113,0.15);border:1px solid rgba(46,204,113,0.3);color:var(--success);}
.toast.error{background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.3);color:var(--danger);}
.toast.info{background:rgba(212,148,26,0.15);border:1px solid rgba(212,148,26,0.3);color:var(--accent);}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeOut{to{opacity:0}}

/* Sync */
.sync-indicator{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);}
.sync-dot.online{background:var(--success);box-shadow:0 0 8px var(--success-glow);}

/* Responsive */
@media(max-width:600px){.page-title{font-size:1.2rem;letter-spacing:2px;}.stats-grid{gap:8px;}.stat-value{font-size:20px;}.dice-face{width:110px;height:110px;padding:14px;top:15px;left:15px;}.dot{width:16px;height:16px;}.main-container{padding:16px 16px 100px;}}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<!-- ========== 首页 ========== -->
<div id="home-page" class="page active">
<div class="home-content">
    <div class="home-title">EDGE DICE</div>
    <div class="home-subtitle">清零边缘次数，重获自由</div>
    <div class="home-input-wrap">
        <input class="home-input" id="player-name-input" placeholder="输入你的名字" maxlength="12" autocomplete="off">
        <button class="home-btn" onclick="enterGame()">进入游戏</button>
    </div>
    <div class="home-admin-link" onclick="showAdminLogin()"><i class="fas fa-crown"></i> 管理员入口</div>
</div>
</div>

<!-- ========== 玩家页 ========== -->
<div id="player-page" class="page">
<nav class="top-bar">
    <div class="top-bar-left"><button class="back-btn" onclick="goHome()"><i class="fas fa-arrow-left"></i> 退出</button></div>
    <div class="page-title">EDGE DICE</div>
    <div class="top-bar-right"><div class="sync-indicator"><div class="sync-dot" id="p-sync-dot"></div><span id="p-sync-text">本地</span></div></div>
</nav>
<div class="main-container">
    <div class="player-badge"><i class="fas fa-user"></i> <span id="p-player-name"></span></div>
    <div id="ban-banner" class="ban-banner" style="display:none;"><i class="fas fa-ban"></i> <span id="ban-text"></span></div>
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">边缘次数</div><div class="stat-value danger" id="p-edge-count">0</div></div>
        <div class="stat-card"><div class="stat-label">利率</div><div class="stat-value accent" id="p-rate">1.00%</div></div>
        <div class="stat-card"><div class="stat-label">积分</div><div class="stat-value success" id="p-points">0</div></div>
        <div class="stat-card"><div class="stat-label">进度</div><div class="stat-value" id="p-progress">0/10</div></div>
    </div>
    <div class="progress-section">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);"><span>进度</span><span id="p-progress-pct">0%</span></div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="p-progress-bar" style="width:0%"></div></div>
    </div>
    <div class="dice-area">
        <div style="position:relative;"><div class="dice-glow" id="dice-glow"></div><div class="dice-scene"><div class="dice-cube idle" id="dice-cube">
            <div class="dice-face face-1"><div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"></div></div>
            <div class="dice-face face-2"><div class="dot-cell"></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"></div></div>
            <div class="dice-face face-3"><div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"></div><div class="dot-cell"></div></div>
            <div class="dice-face face-4"><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot"></div></div></div>
            <div class="dice-face face-5"><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"></div><div class="dot-cell"><div class="dot"></div></div></div>
            <div class="dice-face face-6"><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"><div class="dot"></div></div><div class="dot-cell"><div class="dot"></div></div></div>
        </div></div></div>
        <button class="btn btn-accent roll-btn" id="roll-btn" onclick="handleRoll()">ROLL</button>
    </div>
    <div class="exchange-section">
        <div class="exchange-title"><i class="fas fa-exchange-alt" style="margin-right:6px;"></i>兑换积分</div>
        <div class="exchange-row">
            <span style="font-size:13px;color:var(--muted);">用</span>
            <input class="exchange-input" id="exchange-amount" type="number" value="10" min="1">
            <span style="font-size:13px;color:var(--muted);">次换 1 积分</span>
            <button class="btn btn-success btn-sm" onclick="exchangeEdges()"><i class="fas fa-check"></i> 兑换</button>
        </div>
    </div>
    <div style="margin-top:20px;"><div style="font-size:14px;color:var(--accent);letter-spacing:1px;font-weight:700;margin-bottom:12px;"><i class="fas fa-scroll" style="margin-right:6px;"></i>掷骰记录</div><div class="card"><div class="history-list" id="p-history"><div style="text-align:center;color:var(--muted);padding:20px;font-size:13px;">暂无记录</div></div></div></div>
</div>
</div>

<!-- ========== 管理员页 ========== -->
<div id="admin-page" class="page">
<nav class="top-bar">
    <div class="top-bar-left"><button class="back-btn" onclick="goHome()"><i class="fas fa-arrow-left"></i> 返回</button></div>
    <div class="page-title">ADMIN</div>
    <div class="top-bar-right"><div class="sync-indicator"><div class="sync-dot" id="a-sync-dot"></div><span id="a-sync-text">本地</span></div></div>
</nav>
<div class="main-container">
    <div class="admin-section"><div class="admin-section-title"><i class="fas fa-users" style="margin-right:8px;"></i>所有玩家</div><div id="admin-player-list" class="player-list"><div style="text-align:center;color:var(--muted);padding:20px;font-size:13px;">加载中...</div></div></div>
    <div class="admin-section"><div class="admin-section-title"><i class="fas fa-cog" style="margin-right:8px;"></i>全局设置</div><div class="card">
        <div class="setup-input-group"><label>兑换比例（每N次换1积分）</label><input type="number" id="admin-epp" min="1" value="10"></div>
        <div class="setup-input-group"><label>默认初始次数</label><input type="number" id="admin-init" min="1" value="100"></div>

    </div></div>

        <div class="setup-input-group"><label>当前密码</label><input type="password" id="pw-old" placeholder="输入当前密码"></div>
        <div class="setup-input-group"><label>新密码</label><input type="password" id="pw-new" placeholder="输入新密码"></div>
        <div class="setup-input-group"><label>确认新密码</label><input type="password" id="pw-confirm" placeholder="再次输入新密码"></div>
        <button class="btn btn-accent btn-sm" style="width:100%;" onclick="changePassword()"><i class="fas fa-save"></i> 保存密码</button>
    </div></div>
    <div class="admin-section"><div class="admin-section-title"><i class="fas fa-cloud" style="margin-right:8px;"></i>云同步设置</div><div class="card">
        <div class="setup-input-group"><label>API Key</label><input id="s-apiKey" placeholder="AIzaSy..."></div>
        <div class="setup-input-group"><label>Auth Domain</label><input id="s-authDomain" placeholder="xxx.firebaseapp.com"></div>
        <div class="setup-input-group"><label>Database URL</label><input id="s-databaseURL" placeholder="https://xxx.firebaseio.com"></div>
        <div class="setup-input-group"><label>Project ID</label><input id="s-projectId" placeholder="your-project-id"></div>
        <div class="setup-input-group"><label>App ID</label><input id="s-appId" placeholder="1:123:web:abc"></div>
        <div style="display:flex;gap:8px;"><button class="btn btn-outline" style="flex:1;" onclick="closeOverlay()">取消</button><button class="btn btn-accent" style="flex:1;" onclick="applyFirebaseConfig()">连接</button></div>
    </div></div>
    <div class="admin-section"><div class="admin-section-title"><i class="fas fa-scroll" style="margin-right:8px;"></i>管理员日志</div><div class="card"><div class="history-list" id="a-history" style="max-height:400px;"><div style="text-align:center;color:var(--muted);padding:20px;font-size:13px;">暂无日志</div></div></div></div>
</div>
</div>

<!-- ========== 管理员-玩家详情弹窗 ========== -->
<div class="overlay" id="overlay"><div class="overlay-card" id="overlay-card"></div></div>

<!-- ========== 结果弹窗 ========== -->
<div class="result-overlay" id="result-overlay"><div class="result-card" id="result-card"></div></div>

<!-- ========== Toast ========== -->
<div id="toast-container"></div>

<script>
/* =============================================
   边缘骰子 · Edge Dice — 游戏引擎 v3 (多人版)
   ============================================= */

// ---- Password (hashed) ----
var _dk = 'ed-sk';
var _dh = function(s) { var h = 0; for (var i = 0; i < s.length; i++) { h = ((h << 5) - h) + s.charCodeAt(i); h |= 0; } return 'h_' + Math.abs(h).toString(36); };
var _cv = localStorage.getItem(_dk) || _dh('edge2024');
var _ck = function(p) { return _dh(p) === _cv; };
var _sc = function(p) { _cv = _dh(p); localStorage.setItem(_dk, _cv); };

// ---- Global Config ----
var EDGES_PER_POINT = 10;
var DEFAULT_EDGE_COUNT = 100;
var ADMIN_LOG_KEY = 'ed-admin-log';

// ---- Device ID ----
function generateDeviceId() {
    return 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 6);
}
var DEVICE_ID = localStorage.getItem('ed-device-id');
if (!DEVICE_ID) { DEVICE_ID = generateDeviceId(); localStorage.setItem('ed-device-id', DEVICE_ID); }

// ---- Player State ----
var currentPlayerName = '';
var currentPlayerId = '';  // unique: deviceId + name
var state = null;
var isRolling = false;
var dbRef = null;
var isOnline = false;
var adminLogs = JSON.parse(localStorage.getItem(ADMIN_LOG_KEY) || '[]');
var playerListeners = {};

// ---- Dice Rotations ----
var FACE_ROTATIONS = {
    1: 'rotateX(0deg) rotateY(0deg)',
    2: 'rotateX(0deg) rotateY(-90deg)',
    3: 'rotateX(-90deg) rotateY(0deg)',
    4: 'rotateX(90deg) rotateY(0deg)',
    5: 'rotateX(0deg) rotateY(90deg)',
    6: 'rotateX(180deg) rotateY(0deg)'
};

// ---- Weighted Dice Roll ----
// 1,2,3,6 = 20% each; 4,5 = 10% each
function weightedRoll() {
    var r = Math.random() * 100;
    if (r < 20) return 1;       // 20%
    if (r < 40) return 2;       // 20%
    if (r < 60) return 3;       // 20%
    if (r < 70) return 4;       // 10%
    if (r < 80) return 5;       // 10%
    return 6;                    // 20%
}

// ---- Default State ----
function defaultState() {
    return { edgeCount: DEFAULT_EDGE_COUNT, rate: 0.01, points: 0, currentProgress: 0, edgesPerPoint: EDGES_PER_POINT, banUntil: 0, history: [], lastActive: Date.now() };
}

// ---- Local Storage ----
function getPlayerKey(id) { return 'ed-player-' + id; }
function makePlayerId(name) { return DEVICE_ID + '_' + name; }
function loadPlayerState(id) {
    var saved = localStorage.getItem(getPlayerKey(id));
    if (saved) { try { var p = JSON.parse(saved); return Object.assign(defaultState(), p); } catch(e) {} }
    return defaultState();
}
function savePlayerState() {
    if (!state || !currentPlayerId) return;
    state.lastActive = Date.now();
    state.playerName = currentPlayerName;
    state.deviceId = DEVICE_ID;
    localStorage.setItem(getPlayerKey(currentPlayerId), JSON.stringify(state));
}

// ---- Navigation ----
function showPage(id) {
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
}
function goHome() { currentPlayerName = ''; currentPlayerId = ''; state = null; showPage('home-page'); }

// ---- Enter Game ----
function enterGame() {
    var name = document.getElementById('player-name-input').value.trim();
    if (!name) { toast('请输入你的名字', 'error'); return; }
    if (name.length > 12) { toast('名字最多12个字符', 'error'); return; }
    currentPlayerName = name;
    currentPlayerId = makePlayerId(name);
    state = loadPlayerState(currentPlayerId);
    document.getElementById('p-player-name').textContent = name;
    refreshPlayerUI();
    showPage('player-page');
    syncPlayerFromCloud(name);
}

// ---- Toast ----
function toast(msg, type) {
    type = type || 'info';
    var c = document.getElementById('toast-container');
    var t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(function() { t.remove(); }, 3000);
}

// ---- Flash ----
function flashElement(el) {
    if (!el) return;
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'numFlash .4s ease';
}

// ---- Refresh Player UI ----
function refreshPlayerUI() {
    if (!state) return;
    var ec = document.getElementById('p-edge-count');
    var rt = document.getElementById('p-rate');
    var pt = document.getElementById('p-points');
    var pg = document.getElementById('p-progress');

    if (ec) { ec.textContent = Math.floor(state.edgeCount); flashElement(ec); }
    if (rt) rt.textContent = (state.rate * 100).toFixed(2) + '%';
    if (pt) { pt.textContent = state.points; flashElement(pt); }
    if (pg) pg.textContent = state.currentProgress + '/' + state.edgesPerPoint;

    // Progress bar
    var pct = Math.min((state.currentProgress / state.edgesPerPoint) * 100, 100);
    var bar = document.getElementById('p-progress-bar');
    var pctEl = document.getElementById('p-progress-pct');
    if (bar) bar.style.width = pct + '%';
    if (pctEl) pctEl.textContent = Math.floor(pct) + '%';

    // Ban
    var banBanner = document.getElementById('ban-banner');
    if (Date.now() < state.banUntil) {
        banBanner.style.display = 'block';
        var remain = Math.ceil((state.banUntil - Date.now()) / 60000);
        document.getElementById('ban-text').textContent = '边缘禁令 — 还需等待 ' + remain + ' 分钟';
    } else {
        banBanner.style.display = 'none';
    }

    // History
    renderHistory('p-history', state.history);
}

// ---- Render History ----
function renderHistory(containerId, history) {
    var c = document.getElementById(containerId);
    if (!history || !history.length) {
        c.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;font-size:13px;">暂无记录</div>';
        return;
    }
    c.innerHTML = history.slice(0, 50).map(function(h) {
        var dotClass = h.isEdge ? 'bad' : 'good';
        var time = new Date(h.time);
        var ts = String(time.getHours()).padStart(2,'0') + ':' + String(time.getMinutes()).padStart(2,'0');
        return '<div class="history-item"><div class="history-dot ' + dotClass + '">' + h.num + '</div><div class="history-text">' + h.desc + '</div><div class="history-time">' + ts + '</div></div>';
    }).join('');
}

// ---- Dice Rolling ----
function handleRoll() {
    if (isRolling) return;
    if (Date.now() < state.banUntil) {
        var remain = Math.ceil((state.banUntil - Date.now()) / 60000);
        toast('边缘禁令中！还需等待 ' + remain + ' 分钟', 'error');
        return;
    }
    if (state.points < 1) { toast('积分不足！用边缘次数兑换积分', 'error'); return; }

    isRolling = true;
    var cube = document.getElementById('dice-cube');
    var rollBtn = document.getElementById('roll-btn');
    var glow = document.getElementById('dice-glow');
    rollBtn.disabled = true;
    state.points -= 1;

    cube.classList.remove('idle');
    cube.classList.add('spinning');
    glow.classList.add('show');

    setTimeout(function() {
        var result = weightedRoll();
        // 1,2,3 = punishment (want count to go DOWN, these make it go UP)
        // 4,5,6 = reward (these help reduce count or give points)
        var isPunish = (result <= 3);
        var desc = '';

        cube.classList.remove('spinning');
        cube.style.transform = FACE_ROTATIONS[result];

        switch(result) {
            case 1:
                state.edgeCount = state.edgeCount * 2;
                desc = '惩罚！次数翻倍 → ' + Math.floor(state.edgeCount);
                break;
            case 2:
                state.rate = Math.min(state.rate * 2, 1);
                desc = '惩罚！利率翻倍 → ' + (state.rate * 100).toFixed(2) + '%';
                break;
            case 3:
                state.edgeCount += 30;
                desc = '惩罚！次数+30 → ' + Math.floor(state.edgeCount);
                break;
            case 4:
                var lost = Math.floor(state.edgeCount * 0.25);
                state.edgeCount = Math.max(0, state.edgeCount - lost);
                desc = '奖励！次数-1/4，减少 ' + lost + ' 次';
                break;
            case 5:
                state.rate = Math.max(state.rate * 0.75, 0.001);
                desc = '奖励！利率-1/4 → ' + (state.rate * 100).toFixed(2) + '%';
                break;
            case 6:
                state.points += 1;
                desc = '奖励！获得1积分 → 共 ' + state.points + ' 积分';
                break;
        }

        // Check win
        if (state.edgeCount <= 0) {
            state.edgeCount = 0;
            desc = '🎉 恭喜！边缘次数清零，你赢了！';
            isPunish = false;
        }

        state.history.unshift({ num: result, isEdge: isPunish, desc: desc, time: Date.now() });
        if (state.history.length > 100) state.history = state.history.slice(0, 100);

        savePlayerState();
        syncPlayerToCloud();

        setTimeout(function() {
            glow.classList.remove('show');
            showResult(result, isPunish, desc);
            isRolling = false;
            rollBtn.disabled = false;
            refreshPlayerUI();
        }, 300);
    }, 1300);
}

// ---- Show Result ----
function showResult(num, isEdge, desc) {
    var overlay = document.getElementById('result-overlay');
    var card = document.getElementById('result-card');
    var numColor = isEdge ? 'color:var(--danger)' : 'color:var(--success)';
    var titleText = isEdge ? '惩 罚' : '奖 励';
    card.innerHTML = '<div class="result-num" style="' + numColor + '">' + num + '</div>' +
        '<div class="result-desc">' + titleText + '</div>' +
        '<div class="result-detail">' + desc + '</div>' +
        '<button class="btn btn-accent" style="width:100%;" onclick="closeResult()">确认</button>';
    overlay.classList.add('show');
}
function closeResult() { document.getElementById('result-overlay').classList.remove('show'); }

// ---- Exchange ----
function exchangeEdges() {
    if (!state) return;
    var amount = parseInt(document.getElementById('exchange-amount').value) || state.edgesPerPoint;
    if (amount < 1) { toast('数量至少为1', 'error'); return; }
    if (state.edgeCount < amount) { toast('边缘次数不足', 'error'); return; }
    var pointsGained = Math.floor(amount / state.edgesPerPoint);
    if (pointsGained < 1) { toast('需要至少 ' + state.edgesPerPoint + ' 次才能兑换1积分', 'error'); return; }
    var used = pointsGained * state.edgesPerPoint;
    state.edgeCount -= used;
    state.points += pointsGained;
    state.history.unshift({ num: 0, isEdge: false, desc: '兑换：' + used + '次 → ' + pointsGained + '积分', time: Date.now() });
    savePlayerState();
    syncPlayerToCloud();
    refreshPlayerUI();
    toast(used + ' 次兑换 ' + pointsGained + ' 积分', 'success');
}

// ---- Rate Decay (called periodically) ----
function applyDailyDecay() {
    if (!state) return;
    var decay = Math.ceil(state.edgeCount * state.rate);
    state.edgeCount = Math.max(0, state.edgeCount - decay);
    if (state.edgeCount <= 0) {
        state.edgeCount = 0;
        toast('恭喜！边缘次数已清零！', 'success');
    }
    savePlayerState();
    syncPlayerToCloud();
    refreshPlayerUI();
}

// ---- Admin ----
function showAdminLogin() {
    var overlay = document.getElementById('overlay');
    var card = document.getElementById('overlay-card');
    card.className = 'overlay-card';
    card.innerHTML = '<div class="login-icon"><i class="fas fa-crown"></i></div>' +
        '<div class="login-title">ADMIN</div>' +
        '<div class="login-sub">输入管理员密码</div>' +
        '<div class="login-input-wrap"><label>密码</label><input type="password" id="admin-pw-input" placeholder="输入密码" onkeydown="if(event.key===\'Enter\')verifyAdmin()"></div>' +
        '<div class="login-error" id="admin-error"></div>' +
        '<div style="display:flex;gap:12px;"><button class="btn btn-outline" style="flex:1;" onclick="closeOverlay()">取消</button><button class="btn btn-accent" style="flex:1;" onclick="verifyAdmin()">确认</button></div>';
    overlay.classList.add('show');
}

function verifyAdmin() {
    var pw = document.getElementById('admin-pw-input').value;
    if (_ck(pw)) {
        closeOverlay();
        enterAdmin();
    } else {
        document.getElementById('admin-error').textContent = '密码错误';
    }
}

function enterAdmin() {
    // Load global settings
    document.getElementById('admin-epp').value = EDGES_PER_POINT;
    document.getElementById('admin-init').value = DEFAULT_EDGE_COUNT;
    // Load saved Firebase config
    ['apiKey','authDomain','databaseURL','projectId','appId'].forEach(function(f) {
        var el = document.getElementById('s-' + f);
        if (el) el.value = localStorage.getItem('ed-fb-' + f) || '';
    });
    renderAdminLogs();
    loadAllPlayers();
    showPage('admin-page');
}

function closeOverlay() { document.getElementById('overlay').classList.remove('show'); }

// ---- Admin: Player Management ----
function loadAllPlayers() {
    var container = document.getElementById('admin-player-list');
    if (isOnline && dbRef) {
        dbRef.ref('players').once('value').then(function(snap) {
            var players = snap.val() || {};
            renderPlayerList(container, players);
        }).catch(function(e) {
            console.error('Load players error:', e);
            container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;font-size:13px;">加载失败</div>';
        });
    } else {
        // Load from localStorage
        var players = {};
        for (var i = 0; i < localStorage.length; i++) {
            var key = localStorage.key(i);
            if (key.startsWith('ed-player-')) {
                var name = key.replace('ed-player-', '');
                try { players[name] = JSON.parse(localStorage.getItem(key)); } catch(e) {}
            }
        }
        renderPlayerList(container, players);
    }
}

function renderPlayerList(container, players) {
    var ids = Object.keys(players);
    if (!ids.length) {
        container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;font-size:13px;">暂无玩家</div>';
        return;
    }
    container.innerHTML = ids.sort(function(a,b) {
        return (players[b].lastActive || 0) - (players[a].lastActive || 0);
    }).map(function(pid) {
        var p = players[pid];
        if (!p) return '';
        var displayName = p.playerName || pid.split('_').slice(2).join('_') || pid;
        var shortId = pid.length > 10 ? pid.slice(-6) : pid;
        var active = p.lastActive ? timeAgo(p.lastActive) : '未知';
        return '<div class="player-card" onclick="showPlayerDetail(\'' + pid.replace(/'/g, "\\'") + '\')">' +
            '<div class="player-card-header"><div class="player-name"><i class="fas fa-user"></i> ' + displayName + '<span style="font-size:10px;color:var(--muted);margin-left:6px;">#' + shortId + '</span></div><div style="font-size:11px;color:var(--muted);">' + active + '</div></div>' +
            '<div class="player-stats-mini">' +
            '<div class="player-stat"><div class="player-stat-label">次数</div><div class="player-stat-val" style="color:var(--danger);">' + Math.floor(p.edgeCount || 0) + '</div></div>' +
            '<div class="player-stat"><div class="player-stat-label">利率</div><div class="player-stat-val" style="color:var(--accent);">' + ((p.rate || 0.01) * 100).toFixed(2) + '%</div></div>' +
            '<div class="player-stat"><div class="player-stat-label">积分</div><div class="player-stat-val" style="color:var(--success);">' + (p.points || 0) + '</div></div>' +
            '</div></div>';
    }).join('');
}

function timeAgo(ts) {
    var diff = Date.now() - ts;
    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
    if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
    return Math.floor(diff / 86400000) + '天前';
}

function showPlayerDetail(pid) {
    var pData = loadPlayerState(pid);
    var displayName = pData.playerName || pid.split('_').slice(2).join('_') || pid;
    var overlay = document.getElementById('overlay');
    var card = document.getElementById('overlay-card');
    var sp = pid.replace(/'/g, "\\'");
    card.className = 'overlay-card';
    card.innerHTML = '<div class="overlay-icon accent"><i class="fas fa-user"></i></div>' +
        '<div class="overlay-msg">' + displayName + '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0;font-size:13px;">' +
        '<div style="text-align:center;padding:8px;background:var(--card);border-radius:8px;"><div style="color:var(--muted);font-size:10px;">次数</div><div style="font-weight:700;color:var(--danger);">' + Math.floor(pData.edgeCount) + '</div></div>' +
        '<div style="text-align:center;padding:8px;background:var(--card);border-radius:8px;"><div style="color:var(--muted);font-size:10px;">利率</div><div style="font-weight:700;color:var(--accent);">' + (pData.rate * 100).toFixed(2) + '%</div></div>' +
        '<div style="text-align:center;padding:8px;background:var(--card);border-radius:8px;"><div style="color:var(--muted);font-size:10px;">积分</div><div style="font-weight:700;color:var(--success);">' + pData.points + '</div></div>' +
        '<div style="text-align:center;padding:8px;background:var(--card);border-radius:8px;"><div style="color:var(--muted);font-size:10px;">进度</div><div style="font-weight:700;">' + pData.currentProgress + '/' + pData.edgesPerPoint + '</div></div>' +
        '</div>' +
        '<div style="font-size:12px;color:var(--muted);margin-bottom:8px;">次数调整（当前 ' + Math.floor(pData.edgeCount) + '）</div>' +
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap;">' +
        '<button class="btn btn-outline btn-sm" onclick="adjustPlayer(\'' + sp + '\',\'edgeCount\',-100)">-100</button>' +
        '<button class="btn btn-outline btn-sm" onclick="adjustPlayer(\'' + sp + '\',\'edgeCount\',-10)">-10</button>' +
        '<input type="number" id="adj-edge" value="0" style="width:70px;text-align:center;background:var(--card);color:var(--fg);border:1px solid var(--border);border-radius:8px;padding:6px;">' +
        '<button class="btn btn-outline btn-sm" onclick="adjustPlayer(\'' + sp + '\',\'edgeCount\',10)">+10</button>' +
        '<button class="btn btn-outline btn-sm" onclick="adjustPlayer(\'' + sp + '\',\'edgeCount\',100)">+100</button>' +
        '<button class="btn btn-accent btn-sm" onclick="adjustPlayerByInput(\'' + sp + '\',\'edgeCount\')">应用</button>' +
        '</div>' +
        '<div style="font-size:12px;color:var(--muted);margin-bottom:8px;">积分调整（当前 ' + pData.points + '）</div>' +
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap;">' +
        '<button class="btn btn-outline btn-sm" onclick="adjustPlayer(\'' + sp + '\',\'points\',-5)">-5</button>' +
        '<button class="btn btn-outline btn-sm" onclick="adjustPlayer(\'' + sp + '\',\'points\',-1)">-1</button>' +
        '<input type="number" id="adj-pts" value="0" style="width:70px;text-align:center;background:var(--card);color:var(--fg);border:1px solid var(--border);border-radius:8px;padding:6px;">' +
        '<button class="btn btn-outline btn-sm" onclick="adjustPlayer(\'' + sp + '\',\'points\',1)">+1</button>' +
        '<button class="btn btn-outline btn-sm" onclick="adjustPlayer(\'' + sp + '\',\'points\',5)">+5</button>' +

function adjustPlayerByInput(pid, field) {
    var inputId = field === 'edgeCount' ? 'adj-edge' : 'adj-pts';
    var amount = parseInt(document.getElementById(inputId).value) || 0;
    if (amount === 0) { toast('请输入调整数值', 'error'); return; }
    adjustPlayer(pid, field, amount);
}

function adjustPlayer(pid, field, amount) {
    var pData = loadPlayerState(pid);
    var displayName = pData.playerName || pid;
    if (field === 'edgeCount') {
        pData.edgeCount = Math.max(0, pData.edgeCount + amount);
    } else if (field === 'points') {
        pData.points = Math.max(0, pData.points + amount);
    } else if (field === 'rate') {
        pData.rate = Math.max(0.001, Math.min(1, pData.rate + amount));
    }
    pData.lastActive = Date.now();
    localStorage.setItem(getPlayerKey(pid), JSON.stringify(pData));
    if (isOnline && dbRef) {
        dbRef.ref('players/' + pid).set(pData);
    }
    addAdminLog('调整玩家 ' + displayName + ' 的 ' + field + ' (' + (amount > 0 ? '+' : '') + amount + ')');
    showPlayerDetail(pid);
    loadAllPlayers();
}

function deletePlayer(pid) {
    showConfirm('删除玩家', '确定删除该玩家？数据将无法恢复', function() {
        localStorage.removeItem(getPlayerKey(pid));
        if (isOnline && dbRef) {
            dbRef.ref('players/' + pid).remove();
        }
        addAdminLog('删除玩家 ' + pid);
        closeOverlay();
        loadAllPlayers();
        toast('玩家已删除', 'success');
    });
}

function showConfirm(title, msg, onConfirm) {
    var overlay = document.getElementById('overlay');
    var card = document.getElementById('overlay-card');
    var cbName = '_cb_' + Date.now();
    window[cbName] = function() {
        closeOverlay();
        onConfirm();
        delete window[cbName];
    };
    card.className = 'overlay-card danger-border';
    card.innerHTML = '<div class="overlay-icon danger"><i class="fas fa-exclamation-triangle"></i></div>' +
        '<div class="overlay-msg">' + title + '</div>' +
        '<div class="overlay-sub" style="color:var(--muted);font-size:13px;text-align:center;margin-bottom:20px;">' + msg + '</div>' +
        '<div style="display:flex;gap:12px;"><button class="btn btn-outline" style="flex:1;" onclick="closeOverlay()">取消</button>' +
        '<button class="btn btn-danger" style="flex:1;" onclick="' + cbName + '()">确认</button></div>';
    overlay.classList.add('show');
}

function resetPlayer(pid) {
    var pData = defaultState();
    pData.lastActive = Date.now();
    localStorage.setItem(getPlayerKey(pid), JSON.stringify(pData));
    if (isOnline && dbRef) {
        dbRef.ref('players/' + pid).set(pData);
    }
    addAdminLog('重置玩家 ' + pid);
    closeOverlay();
    loadAllPlayers();
    toast(name + ' 已重置', 'success');

function saveGlobalSettings() {

// ---- Admin: Password ----
function changePassword() {
    var oldPw = document.getElementById('pw-old').value;
    var newPw = document.getElementById('pw-new').value;
    var confirmPw = document.getElementById('pw-confirm').value;
    if (!oldPw) { toast('请输入当前密码', 'error'); return; }
    if (!_ck(oldPw)) { toast('当前密码错误', 'error'); return; }
    if (!newPw) { toast('请输入新密码', 'error'); return; }
    if (newPw.length < 4) { toast('新密码至少4位', 'error'); return; }
    if (newPw !== confirmPw) { toast('两次输入不一致', 'error'); return; }
    _sc(newPw);
    document.getElementById('pw-old').value = '';
    document.getElementById('pw-new').value = '';
    document.getElementById('pw-confirm').value = '';
    addAdminLog('管理员密码已修改');
    toast('密码修改成功', 'success');
}

// ---- Admin Log ----
function addAdminLog(action) {
    adminLogs.unshift({ action: action, time: Date.now() });
    if (adminLogs.length > 100) adminLogs = adminLogs.slice(0, 100);
    localStorage.setItem(ADMIN_LOG_KEY, JSON.stringify(adminLogs));
    renderAdminLogs();
}
function renderAdminLogs() {
    var c = document.getElementById('a-history');
    if (!adminLogs.length) {
        c.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;font-size:13px;">暂无日志</div>';
        return;
    }
    c.innerHTML = adminLogs.slice(0, 50).map(function(l) {
        var t = new Date(l.time);
        var ts = String(t.getMonth()+1).padStart(2,'0') + '/' + String(t.getDate()).padStart(2,'0') + ' ' + String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0');
        return '<div class="history-item"><div class="history-dot neutral" style="background:rgba(212,148,26,0.15);color:var(--accent);border:1px solid rgba(212,148,26,0.3);"><i class="fas fa-cog" style="font-size:10px;"></i></div><div class="history-text">' + l.action + '</div><div class="history-time">' + ts + '</div></div>';
    }).join('');
}

// ---- Firebase ----
function applyFirebaseConfig() {
    var fields = ['apiKey','authDomain','databaseURL','projectId','appId'];
    var config = {};
    for (var i = 0; i < fields.length; i++) {
        var f = fields[i];
        var val = document.getElementById('s-' + f).value.trim();
        if (!val) { toast('请填写 ' + f, 'error'); return; }
        config[f] = val;
        localStorage.setItem('ed-fb-' + f, val);
    }
    initFirebase(config);
    closeOverlay();
}
function initFirebase(config) {
    try {
        if (!firebase.apps.length) {
            firebase.initializeApp(config);
        }
        dbRef = firebase.database();
        isOnline = true;
        updateSyncStatus(true);
        toast('云同步已连接', 'success');
        // Load global config from cloud
        dbRef.ref('config').once('value').then(function(snap) {
            if (snap.exists()) {
                var c = snap.val();
                if (c.edgesPerPoint) { EDGES_PER_POINT = c.edgesPerPoint; localStorage.setItem('ed-epp', EDGES_PER_POINT); }
                if (c.defaultEdgeCount) { DEFAULT_EDGE_COUNT = c.defaultEdgeCount; localStorage.setItem('ed-init', DEFAULT_EDGE_COUNT); }
            }
        });
        // If on player page, sync
        if (currentPlayerName) syncPlayerFromCloud(currentPlayerName);
    } catch(e) {
        console.error('Firebase error:', e);
        toast('连接失败: ' + e.message, 'error');
        updateSyncStatus(false);
    }
}
function syncPlayerToCloud() {
    if (!isOnline || !dbRef || !currentPlayerId) return;
    try { dbRef.ref('players/' + currentPlayerId).set(state); } catch(e) { console.error('Sync error:', e); }
}
function syncPlayerFromCloud(name) {
    if (!isOnline || !dbRef) return;
    var pid = currentPlayerId;
    dbRef.ref('players/' + pid).once('value').then(function(snap) {
        if (snap.exists()) {
            var cloud = snap.val();
            if ((cloud.lastActive || 0) > (state.lastActive || 0)) {
                state = Object.assign(defaultState(), cloud);
                savePlayerState();
                refreshPlayerUI();
                toast('已从云端同步', 'info');
            }
        }
    });
}
function updateSyncStatus(online) {
    var dots = document.querySelectorAll('.sync-dot');
    var texts = document.querySelectorAll('[id$="-sync-text"]');
    dots.forEach(function(d) { d.classList.toggle('online', online); });
    texts.forEach(function(t) { t.textContent = online ? '已同步' : '本地'; });
}

// ---- Background Canvas ----
function initBgCanvas() {
    var canvas = document.getElementById('bg-canvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var particles = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);
    for (var i = 0; i < 60; i++) {
        particles.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3, r: Math.random() * 2 + 0.5 });
    }
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(212,148,26,0.25)'; ctx.fill();
            for (var j = i + 1; j < particles.length; j++) {
                var q = particles[j];
                var dx = p.x - q.x, dy = p.y - q.y, dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 120) {
                    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y);
                    ctx.strokeStyle = 'rgba(212,148,26,' + (0.06 * (1 - dist / 120)) + ')';
                    ctx.lineWidth = 0.5; ctx.stroke();
                }
            }
        }
        requestAnimationFrame(draw);
    }
    draw();
}
