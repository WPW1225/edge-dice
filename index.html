<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>边缘骰子 · Edge Dice</title>
<meta name="theme-color" content="#07070e">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<style>
:root{--bg:#07070e;--bg2:#0c0c18;--card:#10101e;--card2:#14142a;--accent:#d4941a;--accent-glow:rgba(212,148,26,0.35);--accent2:#f0b840;--fg:#e8e4d9;--muted:#6e6b62;--danger:#e74c3c;--danger-glow:rgba(231,76,60,0.3);--success:#2ecc71;--success-glow:rgba(46,204,113,0.3);--info:#3498db;--info-glow:rgba(52,152,219,0.3);--border:#252538;--radius:14px;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans SC',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden;}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.6;}
.page{display:none;position:relative;z-index:1;min-height:100vh;animation:fadeUp .5s ease;}
.page.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes resultPop{from{opacity:0;transform:scale(0.8) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(40px)}}
@keyframes numFlash{0%{transform:scale(1)}30%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes diceIdle{0%,100%{transform:rotateX(-15deg) rotateY(15deg)}50%{transform:rotateX(-10deg) rotateY(25deg)}}
@keyframes dice-spin{0%{transform:rotateX(0) rotateY(0) rotateZ(0)}15%{transform:rotateX(120deg) rotateY(60deg) rotateZ(30deg)}30%{transform:rotateX(240deg) rotateY(180deg) rotateZ(-20deg)}50%{transform:rotateX(400deg) rotateY(300deg) rotateZ(60deg)}70%{transform:rotateX(600deg) rotateY(420deg) rotateZ(-40deg)}85%{transform:rotateX(780deg) rotateY(540deg) rotateZ(20deg)}100%{transform:rotateX(900deg) rotateY(630deg) rotateZ(0)}}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;position:sticky;top:0;z-index:10;background:linear-gradient(180deg,rgba(7,7,14,.95) 60%,rgba(7,7,14,0));backdrop-filter:blur(8px);}
.back-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px;transition:all .2s;font-family:inherit;}
.back-btn:hover{border-color:var(--accent);color:var(--accent);}
.page-title{font-family:'Cinzel',serif;font-size:20px;font-weight:900;letter-spacing:4px;color:var(--accent);}
.top-bar-right{display:flex;align-items:center;gap:8px;}
.sync-indicator{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);padding:4px 10px;border-radius:20px;background:rgba(255,255,255,0.03);border:1px solid var(--border);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);}
.sync-dot.online{background:var(--success);box-shadow:0 0 6px var(--success-glow);}
.home-content{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 20px;text-align:center;}
.home-title{font-family:'Cinzel',serif;font-size:clamp(36px,8vw,72px);font-weight:900;letter-spacing:6px;color:var(--accent);text-shadow:0 0 60px var(--accent-glow),0 0 120px rgba(212,148,26,0.15);margin-bottom:8px;}
.home-subtitle{font-size:16px;color:var(--muted);letter-spacing:2px;margin-bottom:40px;font-weight:300;}
.player-name-section{margin-bottom:40px;width:100%;max-width:320px;}
.player-name-section label{display:block;font-size:12px;color:var(--muted);letter-spacing:1px;margin-bottom:8px;text-transform:uppercase;}
.player-name-section input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--fg);padding:12px 16px;border-radius:10px;font-size:16px;font-family:inherit;outline:none;transition:border-color .2s;text-align:center;}
.player-name-section input:focus{border-color:var(--accent);}
.player-name-display{font-size:14px;color:var(--accent);margin-bottom:30px;min-height:20px;}
.role-cards{display:flex;gap:32px;flex-wrap:wrap;justify-content:center;}
.role-card{width:280px;padding:48px 32px;border-radius:20px;background:linear-gradient(145deg,var(--card),var(--card2));border:1px solid var(--border);cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.role-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .35s;}
.role-card:hover{transform:translateY(-6px);border-color:var(--accent);box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 40px var(--accent-glow);}
.role-card:hover::before{opacity:1;}
.role-card i{font-size:48px;color:var(--accent);margin-bottom:20px;display:block;}
.role-card h2{font-family:'Cinzel',serif;font-size:22px;font-weight:700;margin-bottom:12px;letter-spacing:2px;}
.role-card p{font-size:14px;color:var(--muted);line-height:1.6;}
.role-card .lock-hint{margin-top:16px;font-size:12px;color:var(--accent);opacity:0.7;display:flex;align-items:center;justify-content:center;gap:6px;}
.home-footer{margin-top:48px;display:flex;gap:16px;align-items:center;}
.home-footer a{font-size:12px;color:var(--muted);cursor:pointer;text-decoration:none;transition:color .2s;}
.home-footer a:hover{color:var(--accent);}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;transition:border-color .3s;}
.card:hover{border-color:rgba(212,148,26,0.2);}
.card-label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;}
.card-value{font-size:clamp(28px,5vw,42px);font-weight:900;font-family:'Cinzel',serif;}
.card-value.accent{color:var(--accent);}.card-value.danger{color:var(--danger);}.card-value.success{color:var(--success);}.card-value.info{color:var(--info);}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;padding:0 24px 20px;max-width:900px;margin:0 auto;}
.main-container{max-width:900px;margin:0 auto;padding:0 20px 40px;}
.dice-section{display:flex;flex-direction:column;align-items:center;padding:40px 24px;}
.dice-scene{width:130px;height:130px;perspective:600px;margin-bottom:32px;}
.dice-cube{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.2,.8,.3,1);}
.dice-cube.spinning{animation:dice-spin 1.3s cubic-bezier(.1,.8,.2,1);}
.dice-face{position:absolute;width:130px;height:130px;border-radius:16px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:18px;gap:4px;background:linear-gradient(145deg,#1a1a30,#12122a);border:2px solid rgba(212,148,26,0.4);box-shadow:inset 0 0 30px rgba(0,0,0,0.4);}
.dice-face .dot-cell{display:flex;align-items:center;justify-content:center;}
.dice-face .dot{width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--accent2),var(--accent));box-shadow:0 0 10px var(--accent-glow),0 2px 4px rgba(0,0,0,0.5);}
.face-1{transform:translateZ(65px);}.face-6{transform:rotateY(180deg) translateZ(65px);}.face-2{transform:rotateY(90deg) translateZ(65px);}.face-5{transform:rotateY(-90deg) translateZ(65px);}.face-3{transform:rotateX(90deg) translateZ(65px);}.face-4{transform:rotateX(-90deg) translateZ(65px);}
.dice-glow{position:absolute;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,var(--accent-glow),transparent 70%);pointer-events:none;opacity:0;transition:opacity .3s;top:50%;left:50%;transform:translate(-50%,-50%);z-index:-1;}
.dice-glow.show{opacity:1;}
.dice-cube.idle{animation:diceIdle 4s ease-in-out infinite;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 28px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;}
.btn:active{transform:scale(0.96);}
.btn-accent{background:linear-gradient(135deg,var(--accent),#b87a10);color:#0a0a0f;box-shadow:0 4px 20px var(--accent-glow);}
.btn-accent:hover{box-shadow:0 6px 30px var(--accent-glow);transform:translateY(-1px);}
.btn-accent:disabled{opacity:0.4;cursor:not-allowed;transform:none!important;box-shadow:none;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--fg);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-outline:disabled{opacity:0.3;cursor:not-allowed;}
.btn-danger{background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.3);color:var(--danger);}
.btn-danger:hover{background:rgba(231,76,60,0.25);}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:8px;}
.btn-group{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.progress-wrap{margin-top:8px;}
.progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.progress-text{font-size:13px;color:var(--muted);margin-top:6px;}
.history-list{max-height:300px;overflow-y:auto;padding-right:8px;}
.history-list::-webkit-scrollbar{width:4px;}.history-list::-webkit-scrollbar-track{background:transparent;}.history-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.history-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:8px;margin-bottom:6px;background:rgba(255,255,255,0.02);border:1px solid transparent;transition:all .2s;font-size:13px;}
.history-item:hover{border-color:var(--border);background:rgba(255,255,255,0.04);}
.history-dot{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:900;font-size:14px;flex-shrink:0;}
.history-dot.good{background:rgba(46,204,113,0.15);color:var(--success);}.history-dot.bad{background:rgba(231,76,60,0.15);color:var(--danger);}.history-dot.neutral{background:rgba(212,148,26,0.15);color:var(--accent);}.history-dot.info-dot{background:rgba(52,152,219,0.15);color:var(--info);}
.history-desc{flex:1;color:var(--muted);}.history-time{font-size:11px;color:var(--border);white-space:nowrap;}
.admin-section{margin-bottom:28px;}
.admin-section-title{font-size:14px;color:var(--accent);letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.admin-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;}
.admin-row label{font-size:14px;color:var(--muted);min-width:140px;}
.admin-row input[type="number"],.admin-row input[type="text"]{background:var(--bg);border:1px solid var(--border);color:var(--fg);padding:8px 14px;border-radius:8px;font-size:15px;width:140px;font-family:inherit;outline:none;transition:border-color .2s;}
.admin-row input:focus{border-color:var(--accent);}
.admin-status-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:12px;}
.admin-stat{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;}
.admin-stat .stat-label{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;}
.admin-stat .stat-value{font-size:22px;font-weight:700;font-family:'Cinzel',serif;}
#toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:10px;pointer-events:none;}
.toast{padding:14px 22px;border-radius:10px;font-size:14px;font-weight:500;pointer-events:auto;animation:toastIn .4s ease;max-width:340px;box-shadow:0 10px 40px rgba(0,0,0,0.5);backdrop-filter:blur(12px);border:1px solid;}
.toast.success{background:rgba(46,204,113,0.12);border-color:rgba(46,204,113,0.3);color:var(--success);}
.toast.error{background:rgba(231,76,60,0.12);border-color:rgba(231,76,60,0.3);color:var(--danger);}
.toast.info{background:rgba(212,148,26,0.12);border-color:rgba(212,148,26,0.3);color:var(--accent);}
.toast.out{animation:toastOut .3s ease forwards;}
.num-flash{animation:numFlash .5s ease;}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;background:rgba(7,7,14,0.88);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;}
.overlay.show{display:flex;animation:fadeIn .25s ease;}
.overlay-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 40px;text-align:center;max-width:400px;width:90%;animation:resultPop .4s cubic-bezier(.2,.8,.3,1);}
.overlay-card.danger-border{border-color:rgba(231,76,60,0.3);}
.overlay-icon{font-size:40px;margin-bottom:16px;}
.overlay-icon.danger{color:var(--danger);}.overlay-icon.accent{color:var(--accent);}.overlay-icon.success{color:var(--success);}
.overlay-msg{font-size:16px;font-weight:600;margin-bottom:8px;line-height:1.5;}
.overlay-sub{font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.6;}
.overlay-btns{display:flex;gap:12px;justify-content:center;}
.result-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;background:rgba(7,7,14,0.85);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;}
.result-overlay.show{display:flex;animation:fadeIn .3s ease;}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:48px 40px;text-align:center;max-width:420px;width:90%;animation:resultPop .5s cubic-bezier(.2,.8,.3,1);}
.result-card .result-num{font-family:'Cinzel',serif;font-size:72px;font-weight:900;margin-bottom:8px;}
.result-card .result-desc{font-size:18px;font-weight:600;margin-bottom:8px;}
.result-card .result-detail{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.8;}
.login-card{max-width:380px;padding:40px 36px;}
.login-card .login-icon{font-size:48px;color:var(--accent);margin-bottom:20px;}
.login-card .login-title{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--accent);letter-spacing:3px;margin-bottom:6px;}
.login-card .login-sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
.login-input-wrap{position:relative;margin-bottom:16px;text-align:left;}
.login-input-wrap label{display:block;font-size:12px;color:var(--muted);letter-spacing:1px;margin-bottom:6px;}
.login-input-wrap input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--fg);padding:12px 44px 12px 16px;border-radius:10px;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;}
.login-input-wrap input:focus{border-color:var(--accent);}
.login-input-wrap .toggle-pw{position:absolute;right:12px;bottom:12px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:4px;}
.login-error{font-size:12px;color:var(--danger);margin-bottom:12px;min-height:18px;}
.login-btns{display:flex;gap:12px;justify-content:center;margin-top:8px;}
.login-btns .btn{flex:1;}
.setup-card{max-width:440px;padding:36px 32px;text-align:left;}
.setup-card .setup-icon{font-size:40px;color:var(--accent);margin-bottom:16px;text-align:center;}
.setup-card .setup-title{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--accent);letter-spacing:2px;margin-bottom:6px;text-align:center;}
.setup-card .setup-sub{font-size:13px;color:var(--muted);margin-bottom:20px;text-align:center;line-height:1.6;}
.setup-input-group{margin-bottom:12px;}
.setup-input-group label{display:block;font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:4px;text-transform:uppercase;}
.setup-input-group input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--fg);padding:10px 14px;border-radius:8px;font-size:13px;font-family:monospace;outline:none;transition:border-color .2s;}
.setup-input-group input:focus{border-color:var(--accent);}
.edge-section{padding:0 24px 20px;}
.edge-section .card{display:flex;flex-wrap:wrap;align-items:center;gap:16px;}
.edge-label{font-size:14px;color:var(--muted);font-weight:500;min-width:80px;}
.rules-section{padding:0 24px 20px;max-width:900px;margin:0 auto;}
.rules-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;}
.rule-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;text-align:center;}
.rule-item .rule-num{font-family:'Cinzel',serif;font-size:24px;font-weight:900;margin-bottom:4px;}
.rule-item .rule-num.r1{color:var(--danger);}.rule-item .rule-num.r2{color:var(--danger);}.rule-item .rule-num.r3{color:var(--success);}.rule-item .rule-num.r4{color:var(--success);}.rule-item .rule-num.r5{color:var(--success);}.rule-item .rule-num.r6{color:var(--info);}
.rule-item .rule-desc{font-size:12px;color:var(--muted);line-height:1.5;}
@media(max-width:640px){
.stats-grid{grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px 16px;}
.card{padding:16px;}.card-value{font-size:24px;}
.dice-scene{width:100px;height:100px;}.dice-face{width:100px;height:100px;padding:12px;}.dice-face .dot{width:16px;height:16px;}
.face-1{transform:translateZ(50px);}.face-6{transform:rotateY(180deg) translateZ(50px);}.face-2{transform:rotateY(90deg) translateZ(50px);}.face-5{transform:rotateY(-90deg) translateZ(50px);}.face-3{transform:rotateX(90deg) translateZ(50px);}.face-4{transform:rotateX(-90deg) translateZ(50px);}
.role-cards{gap:16px;}.role-card{width:100%;max-width:300px;padding:32px 24px;}
.result-card,.overlay-card,.login-card,.setup-card{padding:28px 20px;}
}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>

<!-- ========== 首页 ========== -->
<div id="home-page" class="page active">
<div class="home-content">
<div class="home-title">EDGE DICE</div>
<div class="home-subtitle">目标：清空剩余边缘次数</div>
<div class="player-name-section">
<label>你的名字</label>
<input type="text" id="player-name-input" placeholder="输入名字开始游戏" maxlength="20">
</div>
<div class="player-name-display" id="player-name-display"></div>
<div class="role-cards">
<div class="role-card" onclick="onAdminCardClick()" role="button" tabindex="0">
<i class="fas fa-crown"></i><h2>ADMIN</h2>
<p>控制游戏参数，管理玩家状态</p>
<div class="lock-hint"><i class="fas fa-lock"></i> 需要密码</div>
</div>
<div class="role-card" onclick="enterPlayerPage()" role="button" tabindex="0">
<i class="fas fa-dice"></i><h2>PLAYER</h2>
<p>掷骰子改变命运，清空边缘次数</p>
</div>
</div>
<div class="home-footer">
<a onclick="showSetup()"><i class="fas fa-cloud"></i> 云同步设置</a>
</div>
</div>
</div>

<!-- ========== 玩家页面 ========== -->
<div id="player-page" class="page">
<nav class="top-bar">
<button class="back-btn" onclick="navigateTo('home')"><i class="fas fa-arrow-left"></i> 返回</button>
<div class="page-title" id="player-page-title">EDGE DICE</div>
<div class="top-bar-right"><div class="sync-indicator"><div class="sync-dot" id="p-sync-dot"></div><span id="p-sync-text">本地</span></div></div>
</nav>
<div class="stats-grid">
<div class="card"><div class="card-label">剩余边缘次数</div><div class="card-value danger" id="p-edge-count">0</div></div>
<div class="card"><div class="card-label">当前利率</div><div class="card-value accent" id="p-rate">1.00%</div></div>
<div class="card"><div class="card-label">积分</div><div class="card-value info" id="p-points">0</div></div>
<div class="card"><div class="card-label">边缘进度</div><div class="card-value success" id="p-progress-text">0/10</div></div>

<script>
/* =============================================
   边缘骰子 · Edge Dice — 游戏引擎 v2
   ============================================= */

var STATE_KEY = 'edge-dice-state-v2';
var ADMIN_PASSWORD = 'edge2024';
var EDGES_PER_POINT = 10; // 默认每10次换1积分

var state = loadState();
var isRolling = false;
var dbRef = null;
var isOnline = false;

// ---- Default State ----
function defaultState() {
    return {
        playerName: '',
        edgeCount: 1000,
        points: 0,
        rate: 0.01,
        edgesPerPoint: 10,
        initialCount: 1000,
        currentProgress: 0,
        history: [],
        adminLog: []
    };
}

function loadState() {
    try {
        var saved = localStorage.getItem(STATE_KEY);
        if (saved) {
            var parsed = JSON.parse(saved);
            var d = defaultState();
            for (var k in d) { if (parsed[k] === undefined) parsed[k] = d[k]; }
            return parsed;
        }
    } catch(e) { console.warn('Load error:', e); }
    return defaultState();
}

function saveState() {
    try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ---- Player Name ----
function getPlayerName() { return state.playerName || ''; }

function setPlayerName(name) {
    state.playerName = name.trim();
    saveState();
    syncToCloud();
    updateNameDisplay();
}

function updateNameDisplay() {
    var input = document.getElementById('player-name-input');
    var display = document.getElementById('player-name-display');
    var title = document.getElementById('player-page-title');
    var name = getPlayerName();
    if (display) display.textContent = name ? name + ' 的游戏' : '';
    if (input) input.value = name;
    if (title) title.textContent = name || 'EDGE DICE';
}

// ---- Navigation ----
function navigateTo(page) {
    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
    var target = document.getElementById(page + '-page');
    if (target) target.classList.add('active');
    if (page === 'player') refreshPlayerUI();
    if (page === 'admin') refreshAdminUI();
}

function enterPlayerPage() {
    var name = document.getElementById('player-name-input').value.trim();
    if (!name) {
        toast('请先输入你的名字', 'error');
        document.getElementById('player-name-input').focus();
        return;
    }
    setPlayerName(name);
    navigateTo('player');
}

// ---- Toast ----
function toast(msg, type) {
    type = type || 'info';
    var container = document.getElementById('toast-container');
    var el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(function() { el.classList.add('out'); setTimeout(function() { el.remove(); }, 300); }, 3000);
}

// ---- Flash Animation ----
function flashElement(el) {
    if (!el) return;
    el.classList.remove('num-flash');
    void el.offsetWidth;
    el.classList.add('num-flash');
}

// ---- Weighted Dice Roll ----
// 1,2,3,6 = 20% each; 4,5 = 10% each
function rollWeightedDice() {
    var rand = Math.random();
    if (rand < 0.20) return 1;
    if (rand < 0.40) return 2;
    if (rand < 0.60) return 3;
    if (rand < 0.70) return 4;
    if (rand < 0.80) return 5;
    return 6;
}

// ---- Dice Face Rotations ----
var FACE_ROTATIONS = {
    1: 'rotateX(0deg) rotateY(0deg)',
    2: 'rotateX(0deg) rotateY(-90deg)',
    3: 'rotateX(-90deg) rotateY(0deg)',
    4: 'rotateX(90deg) rotateY(0deg)',
    5: 'rotateX(0deg) rotateY(90deg)',
    6: 'rotateX(180deg) rotateY(0deg)'
};

// ---- Handle Roll ----
function handleRoll() {
    if (isRolling) return;

    if (state.points < 1) {
        toast('积分不足！边缘次数每' + state.edgesPerPoint + '换1积分', 'error');
        return;
    }

    isRolling = true;
    var cube = document.getElementById('dice-cube');
    var rollBtn = document.getElementById('roll-btn');
    var glow = document.getElementById('dice-glow');
    rollBtn.disabled = true;
    state.points -= 1;

    cube.classList.remove('idle');
    cube.classList.add('spinning');
    glow.classList.add('show');

    setTimeout(function() {
        var result = rollWeightedDice();
        cube.classList.remove('spinning');
        cube.style.transform = FACE_ROTATIONS[result];

        setTimeout(function() {
            glow.classList.remove('show');
            applyDiceResult(result);
            isRolling = false;
            rollBtn.disabled = false;
            saveState();
            syncToCloud();
            refreshPlayerUI();
        }, 300);
    }, 1300);
}

// ---- Apply Dice Result ----
function applyDiceResult(num) {
    var desc = '';
    var detail = '';
    var isGood = false;

    if (num === 1) {
        // 次数翻倍
        var added = state.edgeCount;
        state.edgeCount = state.edgeCount * 2;
        desc = '次数翻倍！';
        detail = '+' + added + ' 边缘次数（' + state.edgeCount + '）';
        isGood = false;
    } else if (num === 2) {
        // 利率翻倍
        var oldRate = state.rate;
        state.rate = Math.min(state.rate * 2, 10);
        desc = '利率翻倍！';
        detail = (oldRate * 100).toFixed(2) + '% → ' + (state.rate * 100).toFixed(2) + '%';
        isGood = false;
    } else if (num === 3) {
        // 次数+30
        state.edgeCount += 30;
        desc = '次数 +30';
        detail = '剩余 ' + state.edgeCount + ' 次';
        isGood = false;
    } else if (num === 4) {
        // 次数-1/4
        var reduced = Math.floor(state.edgeCount / 4);
        state.edgeCount = Math.max(0, state.edgeCount - reduced);
        desc = '次数 -1/4';
        detail = '-' + reduced + ' 边缘次数（剩余 ' + state.edgeCount + '）';
        isGood = true;
    } else if (num === 5) {
        // 利率-1/4
        var oldRate5 = state.rate;
        state.rate = Math.max(state.rate * 0.75, 0.001);
        desc = '利率 -1/4';
        detail = (oldRate5 * 100).toFixed(2) + '% → ' + (state.rate * 100).toFixed(2) + '%';
        isGood = true;
    } else if (num === 6) {
        // 获得1积分
        state.points += 1;
        desc = '获得 1 积分';
        detail = '当前积分 ' + state.points;
        isGood = true;
    }

    // 进度累加
    state.currentProgress += 1;
    if (state.currentProgress >= state.edgesPerPoint) {
        var gained = Math.floor(state.currentProgress / state.edgesPerPoint);
        state.points += gained;
        state.currentProgress = state.currentProgress % state.edgesPerPoint;
        detail += ' | 进度兑换 +' + gained + ' 积分';
    }

    addHistory(num, !isGood, desc);
    showResult(num, !isGood, desc, detail);

    // 检查胜利条件
    if (state.edgeCount <= 0) {
        state.edgeCount = 0;
        setTimeout(function() { toast('恭喜清空边缘次数！你赢了！', 'success'); }, 1500);
    }
}

// ---- Result Overlay ----
function showResult(num, isBad, desc, detail) {
    var overlay = document.getElementById('result-overlay');
    var card = document.getElementById('result-card');
    var color = isBad ? 'var(--danger)' : 'var(--success)';
    var borderColor = isBad ? 'border-color:rgba(231,76,60,0.4)' : 'border-color:rgba(46,204,113,0.4)';

    card.style.cssText = borderColor;
    card.innerHTML = '<div class="result-num" style="color:' + color + '">' + num + '</div>' +
        '<div class="result-desc" style="color:' + color + '">' + desc + '</div>' +
        '<div class="result-detail">' + detail + '</div>' +
        '<button class="btn ' + (isBad ? 'btn-danger' : 'btn-accent') + '" onclick="closeResult()">继续</button>';
    overlay.classList.add('show');

    if (isBad) {
        card.style.animation = 'none';
        void card.offsetWidth;
        card.style.animation = 'shake 0.6s ease, resultPop 0.5s cubic-bezier(.2,.8,.3,1)';
    }
    saveState();
    syncToCloud();
}

function closeResult() {
    document.getElementById('result-overlay').classList.remove('show');
    isRolling = false;
    var rollBtn = document.getElementById('roll-btn');
    if (rollBtn) rollBtn.disabled = false;
    refreshPlayerUI();
}

// ---- History ----
function addHistory(num, isBad, desc) {
    state.history.unshift({ num: num, isBad: isBad, desc: desc, time: Date.now() });
    if (state.history.length > 50) state.history = state.history.slice(0, 50);
}

function renderHistory(containerId) {
    var container = document.getElementById(containerId);
    if (!container) return;
    if (!state.history.length) {
        container.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;font-size:13px;">暂无记录</div>';
        return;
    }
    var html = '';
    for (var i = 0; i < state.history.length; i++) {
        var h = state.history[i];
        var dotClass = h.isBad ? 'bad' : (h.num === 6 ? 'info-dot' : 'good');
        var dotText = h.num > 0 ? h.num : '\u2605';
        var time = new Date(h.time);
        var timeStr = String(time.getHours()).padStart(2, '0') + ':' + String(time.getMinutes()).padStart(2, '0');
        html += '<div class="history-item"><div class="history-dot ' + dotClass + '">' + dotText + '</div><div class="history-desc">' + h.desc + '</div><div class="history-time">' + timeStr + '</div></div>';
    }
    container.innerHTML = html;
}

// ---- Admin Functions ----
function onAdminCardClick() {
    var overlay = document.getElementById('overlay');
    var card = document.getElementById('overlay-card');
    card.className = 'overlay-card login-card';
    card.innerHTML = '<div class="login-icon"><i class="fas fa-crown"></i></div>' +
        '<div class="login-title">ADMIN</div>' +
        '<div class="login-sub">输入管理员密码</div>' +
        '<div class="login-input-wrap"><label>密码</label>' +
        '<input type="password" id="admin-pw-input" placeholder="输入密码" onkeydown="if(event.key===\'Enter\')verifyAdmin()">' +
        '<button class="toggle-pw" onclick="togglePw(\'admin-pw-input\',this)"><i class="fas fa-eye"></i></button></div>' +
        '<div class="login-error" id="admin-error"></div>' +
        '<div class="login-btns"><button class="btn btn-outline" onclick="closeOverlay()">取消</button>' +
        '<button class="btn btn-accent" onclick="verifyAdmin()">确认</button></div>';
    overlay.classList.add('show');
    setTimeout(function() { document.getElementById('admin-pw-input').focus(); }, 100);
}

function togglePw(inputId, btn) {
    var input = document.getElementById(inputId);
    if (input.type === 'password') { input.type = 'text'; btn.innerHTML = '<i class="fas fa-eye-slash"></i>'; }
    else { input.type = 'password'; btn.innerHTML = '<i class="fas fa-eye"></i>'; }
}

function verifyAdmin() {
    var pw = document.getElementById('admin-pw-input').value;
    if (pw === ADMIN_PASSWORD) {
        closeOverlay();
        navigateTo('admin');
    } else {
        document.getElementById('admin-error').textContent = '密码错误';
    }
}

function closeOverlay() {
    document.getElementById('overlay').classList.remove('show');
}

function addAdminLog(action) {
    state.adminLog.unshift({ action: action, time: Date.now() });
    if (state.adminLog.length > 100) state.adminLog = state.adminLog.slice(0, 100);
}

function applyEdgesPerPoint() {
    var val = parseInt(document.getElementById('a-edges-per-point').value);
    if (val > 0) {
        state.edgesPerPoint = val;
        addAdminLog('每积分所需次数设为 ' + val);
        saveState(); syncToCloud(); refreshAdminUI();
        toast('已更新：每' + val + '次换1积分', 'success');
    }
}

function applyInitialCount() {
    var val = parseInt(document.getElementById('a-initial-count').value);
    if (val > 0) {
        state.initialCount = val;
        addAdminLog('起始次数设为 ' + val);
        saveState(); syncToCloud(); refreshAdminUI();
        toast('起始次数已更新', 'success');
    }
}

function adjustPoints(delta) {
    state.points = Math.max(0, state.points + delta);
    addAdminLog('积分 ' + (delta > 0 ? '+' : '') + delta);
    saveState(); syncToCloud(); refreshAdminUI();
}

function adjustEdge(delta) {
    state.edgeCount = Math.max(0, state.edgeCount + delta);
    addAdminLog('边缘次数 ' + (delta > 0 ? '+' : '') + delta);
    saveState(); syncToCloud(); refreshAdminUI();
}

function adjustRate(delta) {
    state.rate = Math.max(0.001, Math.min(10, state.rate + delta));
    addAdminLog('利率调整为 ' + (state.rate * 100).toFixed(2) + '%');
    saveState(); syncToCloud(); refreshAdminUI();
}

function doubleRate() {
    state.rate = Math.min(state.rate * 2, 10);
    addAdminLog('利率翻倍至 ' + (state.rate * 100).toFixed(2) + '%');
    saveState(); syncToCloud(); refreshAdminUI();
}

function halveRate() {
    state.rate = Math.max(state.rate / 2, 0.001);
    addAdminLog('利率减半至 ' + (state.rate * 100).toFixed(2) + '%');
    saveState(); syncToCloud(); refreshAdminUI();
}

function resetRate() {
    state.rate = 0.01;
    addAdminLog('利率重置为 1%');
    saveState(); syncToCloud(); refreshAdminUI();
}

function requestResetGame() {
    showConfirm('重置游戏', '所有数据将被清除，确定吗？', function() {
        state = defaultState();
        addAdminLog('游戏已重置');
        saveState(); syncToCloud(); refreshAdminUI();
        toast('游戏已重置', 'success');
    });
}

function requestClearHistory() {
    showConfirm('清空记录', '掷骰记录和管理员日志将被清除', function() {
        state.history = [];
        state.adminLog = [];
        addAdminLog('记录已清空');
        saveState(); syncToCloud(); refreshAdminUI();
        toast('记录已清空', 'success');
    });
}

function showConfirm(title, msg, onConfirm) {
    var overlay = document.getElementById('overlay');
    var card = document.getElementById('overlay-card');
    card.className = 'overlay-card danger-border';
    card.innerHTML = '<div class="overlay-icon danger"><i class="fas fa-exclamation-triangle"></i></div>' +
        '<div class="overlay-msg">' + title + '</div>' +
        '<div class="overlay-sub">' + msg + '</div>' +
        '<div class="overlay-btns">' +
        '<button class="btn btn-outline" onclick="closeOverlay()">取消</button>' +
        '<button class="btn btn-danger" id="confirm-action-btn">确认</button></div>';
    overlay.classList.add('show');
    document.getElementById('confirm-action-btn').onclick = function() {
        closeOverlay();
        onConfirm();
    };
}

// ---- UI Refresh ----
function refreshPlayerUI() {
    var edgeEl = document.getElementById('p-edge-count');
    var rateEl = document.getElementById('p-rate');
    var pointsEl = document.getElementById('p-points');
    var progressTextEl = document.getElementById('p-progress-text');
    var progressBar = document.getElementById('p-progress-bar');
    var progressDetail = document.getElementById('p-progress-detail');

    if (edgeEl) { edgeEl.textContent = state.edgeCount; flashElement(edgeEl); }
    if (rateEl) { rateEl.textContent = (state.rate * 100).toFixed(2) + '%'; flashElement(rateEl); }
    if (pointsEl) { pointsEl.textContent = state.points; flashElement(pointsEl); }
    if (progressTextEl) { progressTextEl.textContent = state.currentProgress + '/' + state.edgesPerPoint; }

    if (progressBar) {
        var pct = Math.min((state.currentProgress / state.edgesPerPoint) * 100, 100);
        progressBar.style.width = pct + '%';
    }
    if (progressDetail) {
        progressDetail.textContent = '每' + state.edgesPerPoint + '次边缘进度兑换1积分（还需 ' + Math.max(0, state.edgesPerPoint - state.currentProgress) + '）';
    }

    var name = getPlayerName();
    var title = document.getElementById('player-page-title');
    if (title) title.textContent = name || 'EDGE DICE';

    renderHistory('p-history');
}

function refreshAdminUI() {
    var statusEl = document.getElementById('admin-status');
    if (statusEl) {
        var name = getPlayerName() || '未命名';
        statusEl.innerHTML =
            '<div class="admin-stat"><div class="stat-label">玩家</div><div class="stat-value" style="font-size:16px;">' + name + '</div></div>' +
            '<div class="admin-stat"><div class="stat-label">边缘次数</div><div class="stat-value" style="color:var(--danger)">' + state.edgeCount + '</div></div>' +
            '<div class="admin-stat"><div class="stat-label">利率</div><div class="stat-value" style="color:var(--accent)">' + (state.rate * 100).toFixed(2) + '%</div></div>' +
            '<div class="admin-stat"><div class="stat-label">积分</div><div class="stat-value" style="color:var(--info)">' + state.points + '</div></div>' +
            '<div class="admin-stat"><div class="stat-label">进度</div><div class="stat-value" style="color:var(--success)">' + state.currentProgress + '/' + state.edgesPerPoint + '</div></div>' +
            '<div class="admin-stat"><div class="stat-label">起始次数</div><div class="stat-value">' + state.initialCount + '</div></div>';
    }

    document.getElementById('a-edges-per-point').value = state.edgesPerPoint;
    document.getElementById('a-initial-count').value = state.initialCount;

    // Admin log
    var logEl = document.getElementById('a-history');
    if (logEl) {
        if (!state.adminLog.length) {
            logEl.innerHTML = '<div style="text-align:center;color:var(--muted);padding:20px;font-size:13px;">暂无日志</div>';
        } else {
            var html = '';
            for (var i = 0; i < state.adminLog.length; i++) {
                var l = state.adminLog[i];
                var t = new Date(l.time);
                var ts = String(t.getHours()).padStart(2, '0') + ':' + String(t.getMinutes()).padStart(2, '0');
                html += '<div class="history-item"><div class="history-dot neutral"><i class="fas fa-cog" style="font-size:12px;"></i></div><div class="history-desc">' + l.action + '</div><div class="history-time">' + ts + '</div></div>';
            }
            logEl.innerHTML = html;
        }
    }
}

// ---- Firebase ----
function showSetup() {
    var overlay = document.getElementById('overlay');
    var card = document.getElementById('overlay-card');
    card.className = 'overlay-card setup-card';
    card.innerHTML = '<div class="setup-icon"><i class="fas fa-cloud"></i></div>' +
        '<div class="setup-title">云同步设置</div>' +
        '<div class="setup-sub">连接 Firebase Realtime Database 实现多端同步</div>' +
        '<div class="setup-input-group"><label>API Key</label><input id="s-apiKey" placeholder="AIzaSy..." value="' + (localStorage.getItem('ed-fb-apiKey') || '') + '"></div>' +
        '<div class="setup-input-group"><label>Auth Domain</label><input id="s-authDomain" placeholder="xxx.firebaseapp.com" value="' + (localStorage.getItem('ed-fb-authDomain') || '') + '"></div>' +
        '<div class="setup-input-group"><label>Database URL</label><input id="s-databaseURL" placeholder="https://xxx.firebaseio.com" value="' + (localStorage.getItem('ed-fb-databaseURL') || '') + '"></div>' +
        '<div class="setup-input-group"><label>Project ID</label><input id="s-projectId" placeholder="your-project-id" value="' + (localStorage.getItem('ed-fb-projectId') || '') + '"></div>' +
        '<div class="setup-input-group"><label>App ID</label><input id="s-appId" placeholder="1:123:web:abc" value="' + (localStorage.getItem('ed-fb-appId') || '') + '"></div>' +
        '<div style="display:flex;gap:12px;margin-top:20px;justify-content:center;">' +
        '<button class="btn btn-outline" onclick="closeOverlay()">取消</button>' +
        '<button class="btn btn-accent" onclick="applyFirebaseConfig()">连接</button></div>';
    overlay.classList.add('show');
}

function applyFirebaseConfig() {
    var fields = ['apiKey', 'authDomain', 'databaseURL', 'projectId', 'appId'];
    var config = {};
    for (var i = 0; i < fields.length; i++) {
        var val = document.getElementById('s-' + fields[i]).value.trim();
        if (!val) { toast('请填写 ' + fields[i], 'error'); return; }
        config[fields[i]] = val;
        localStorage.setItem('ed-fb-' + fields[i], val);
    }
    initFirebase(config);
    closeOverlay();
}

function initFirebase(config) {
    try {
        if (firebase.apps.length) {
            firebase.apps.forEach(function(app) { app.delete(); });
        }
        startFirebase(config);
    } catch(e) {
        console.error('Firebase init error:', e);
        toast('连接失败: ' + e.message, 'error');
        updateSyncStatus(false);
    }
}

function startFirebase(config) {
    var app = firebase.initializeApp(config);
    dbRef = firebase.database();
    isOnline = true;
    updateSyncStatus(true);
    toast('云同步已连接！', 'success');

    dbRef.ref('gameState').once('value').then(function(snap) {
        if (snap.exists()) {
            var cloudState = snap.val();
            if (cloudState._updatedAt > (state._updatedAt || 0)) {
                var d = defaultState();
                for (var k in d) { if (cloudState[k] === undefined) cloudState[k] = d[k]; }
                state = cloudState;
                saveState();
                refreshPlayerUI();
                refreshAdminUI();
                toast('已从云端同步', 'info');
            }
        }
    });

    dbRef.ref('gameState').on('value', function(snap) {
        if (snap.exists()) {
            var cloudState = snap.val();
            if (cloudState._updatedAt > (state._updatedAt || 0)) {
                var d = defaultState();
                for (var k in d) { if (cloudState[k] === undefined) cloudState[k] = d[k]; }
                state = cloudState;
                saveState();
                refreshPlayerUI();
                refreshAdminUI();
            }
        }
    });
}

function syncToCloud() {
    if (!isOnline || !dbRef) return;
    try {
        state._updatedAt = Date.now();
        dbRef.ref('gameState').set({
            playerName: state.playerName,
            edgeCount: state.edgeCount,
            points: state.points,
            rate: state.rate,
            edgesPerPoint: state.edgesPerPoint,
            initialCount: state.initialCount,
            currentProgress: state.currentProgress,
            history: state.history.slice(-50),
            adminLog: state.adminLog.slice(-50),
            _updatedAt: state._updatedAt
        });
    } catch(e) { console.error('Sync error:', e); }
}

function updateSyncStatus(online) {
    var dots = document.querySelectorAll('.sync-dot');
    var texts = document.querySelectorAll('[id$="-sync-text"]');
    dots.forEach(function(d) { d.className = 'sync-dot ' + (online ? 'online' : ''); });
    texts.forEach(function(t) { t.textContent = online ? '已同步' : '本地'; });
}

// ---- Background Canvas ----
function initBgCanvas() {
    var canvas = document.getElementById('bg-canvas');
    if (!canvas) return;
    var ctx = canvas.getContext('2d');
    var particles = [];
    var count = 40;

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    for (var i = 0; i < count; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            r: Math.random() * 2 + 0.5
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (var i = 0; i < particles.length; i++) {
            var p = particles[i];
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = 0;
            if (p.y < 0) p.y = canvas.height;
            if (p.y > canvas.height) p.y = 0;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(212,148,26,0.3)';
            ctx.fill();
            for (var j = i + 1; j < particles.length; j++) {
                var q = particles[j];
                var dist = Math.sqrt((p.x - q.x) * (p.x - q.x) + (p.y - q.y) * (p.y - q.y));
                if (dist < 120) {
                    ctx.beginPath();
                    ctx.moveTo(p.x, p.y);
                    ctx.lineTo(q.x, q.y);
                    ctx.strokeStyle = 'rgba(212,148,26,' + (0.06 * (1 - dist / 120)) + ')';
                    ctx.lineWidth = 0.5;
                    ctx.stroke();
                }
            }
        }
        requestAnimationFrame(draw);
    }
    draw();
}

// ---- Init ----
document.addEventListener('DOMContentLoaded', function() {
    initBgCanvas();
    updateNameDisplay();
    refreshPlayerUI();
    refreshAdminUI();
    updateSyncStatus(false);

    // Auto-init Firebase if config saved
    var hasConfig = ['apiKey','authDomain','databaseURL','projectId','appId'].every(function(f) {
        return localStorage.getItem('ed-fb-' + f);
    });
    if (hasConfig) {
        var config = {};
        ['apiKey','authDomain','databaseURL','projectId','appId'].forEach(function(f) {
            config[f] = localStorage.getItem('ed-fb-' + f);
        });
        initFirebase(config);
    }
});

window.addEventListener('beforeunload', function() {
    saveState();
    syncToCloud();
});
</script>
